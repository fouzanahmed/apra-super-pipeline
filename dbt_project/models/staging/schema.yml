version: 2

sources:
  - name: raw
    schema: raw
    tables:
      - name: apra_mysuper
      - name: apra_fund_level
      - name: apra_annual_bulletin

models:
  - name: stg_apra_mysuper
    description: "Cleaned and typed MySuper fund-level quarterly stats from APRA."
    columns:
      - name: abn
        tests: [not_null]
      - name: fund_name
        tests: [not_null]
      - name: quarter_date
        tests: [not_null]
      - name: fund_type
        tests:
          - accepted_values:
              values: ["industry", "retail", "public sector", "corporate", "retirement savings account"]
